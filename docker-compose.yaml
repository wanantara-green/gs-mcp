# ──────────────────────────────────────────────────────────
# Training 03 — Stacking: GeoServer + PostGIS + GeoServer MCP
# ──────────────────────────────────────────────────────────
# Stack minimal untuk belajar GeoServer WFS endpoint.
#
# QUICK START:
#   cd stacking
#   docker compose up -d --build
#
#   Service           URL                                  Notes
#   ────────────────────────────────────────────────────────────────────
#   GeoServer         http://localhost:9597/geoserver      admin / geoserver
#   PostGIS           in-network host "postgis" port 5432  db/user/pass: geoserver
#   GeoServer MCP     http://localhost:8000/sse            SSE endpoint
#
# Setelah container aktif:
#   1. Login GeoServer  →  http://localhost:9597/geoserver
#   2. Buat workspace   →  "zonasiluwu"
#   3. Buat store/layer →  Akses WFS endpoint:
#      http://localhost:9597/geoserver/zonasiluwu/ows?service=WFS&version=2.0.0&request=GetCapabilities
# ──────────────────────────────────────────────────────────

services:

  # ── PostGIS Database ──────────────────────────────────
  postgis:
    image: kartoza/postgis:16-3.4
    environment:
      - POSTGRES_DB=${POSTGIS_DB:-geoserver}
      - POSTGRES_USER=${POSTGIS_USER:-geoserver}
      - POSTGRES_PASS=${POSTGIS_PASS:-geoserver}
      - ALLOW_IP_RANGE=0.0.0.0/0
      - POSTGRES_MULTIPLE_EXTENSIONS=postgis
    ports:
      - '5433:5432'
    volumes:
      - postgis-data:/var/lib/postgresql
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGIS_USER:-geoserver} -d ${POSTGIS_DB:-geoserver}"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── GeoServer ─────────────────────────────────────────
  geoserver:
    # Versi DI-PIN (immutable). Sebelumnya ":latest" → auto-upgrade ke major
    # version baru me-reinit /opt/geoserver_data sehingga katalog (workspace,
    # layer, style) hilang saat redeploy. Pin mencegah hal itu terulang.
    image: kartoza/geoserver:3.0.0--v2026.06.25
    depends_on:
      postgis:
        condition: service_healthy
    ports:
      - "9597:8080"
    expose:
      - "8080"
    environment:
      - GEOSERVER_ADMIN_USER=${GEOSERVER_ADMIN_USER:-admin}
      - GEOSERVER_ADMIN_PASSWORD=${GEOSERVER_ADMIN_PASSWORD:-geoserver}
      # CORS — agar map.html (origin training-02) bisa fetch WFS lintas-origin.
      # Diset via env (kartoza) supaya tahan reset volume, bukan edit web.xml manual.
      - CORS_ENABLED=true
      - CORS_ALLOWED_ORIGINS=*
      - CORS_ALLOWED_METHODS=GET,POST,PUT,DELETE,HEAD,OPTIONS
      - CORS_ALLOWED_HEADERS=*
    volumes:
      - geoserver-data:/opt/geoserver_data
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/geoserver/web/"]
      interval: 30s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  # ── PostGIS Seed (one-shot GeoJSON importer) ──────────
  # Import semua *.geojson dari seed/geojson/ ke PostGIS. Idempoten: tabel
  # yang sudah ada & berisi baris dilewati. Nama tabel = basename file
  # di-lowercase, sengaja menyamai mapping SLD di init/init.py supaya
  # geoserver-init bisa otomatis pasang style ke layer.
  postgis-seed:
    build:
      context: ./seed
      dockerfile: Dockerfile
    image: postgis-seed:local
    depends_on:
      postgis:
        condition: service_healthy
    environment:
      - PG_HOST=postgis
      - PG_PORT=5432
      - PG_DB=${POSTGIS_DB:-geoserver}
      - PG_USER=${POSTGIS_USER:-geoserver}
      - PG_PASS=${POSTGIS_PASS:-geoserver}
      - FORCE=${SEED_FORCE:-0}
    networks:
      - app-net
    restart: "no"

  # ── GeoServer Auto-Provisioner (self-healing) ─────────
  # Membangun ulang katalog GeoServer (workspace + datastore PostGIS +
  # 30 layer + 30 SLD) secara IDEMPOTEN setiap deploy. Jika katalog sudah
  # lengkap, langsung skip. Mencegah "workspace hilang" saat volume
  # geoserver-data ter-reset — data mentah tetap aman di PostGIS.
  geoserver-init:
    # init.py di-bake ke image (build context relatif jalan di Coolify;
    # bind-mount volume relatif TIDAK — dulu gagal "can't open /init/init.py").
    build:
      context: ./init
      dockerfile: Dockerfile
    image: geoserver-init:local
    depends_on:
      geoserver:
        condition: service_healthy
      postgis-seed:
        condition: service_completed_successfully
    environment:
      - GEOSERVER_URL=${GEOSERVER_URL:-http://geoserver:8080/geoserver}
      - GEOSERVER_USER=${GEOSERVER_USER:-admin}
      - GEOSERVER_PASSWORD=${GEOSERVER_PASSWORD:-geoserver}
      - GEOSERVER_WORKSPACE=${GEOSERVER_WORKSPACE:-zonasiluwu}
      - PG_HOST=postgis
      - PG_PORT=5432
      - PG_DB=${POSTGIS_DB:-geoserver}
      - PG_USER=${POSTGIS_USER:-geoserver}
      - PG_PASS=${POSTGIS_PASS:-geoserver}
    networks:
      - app-net
    restart: "no"

  # ── GeoServer MCP (SSE) ───────────────────────────────
  geoserver-mcp:
    build:
      # Build context mengarah ke folder geoserver-mcp dalam repo ini
      context: ./geoserver-mcp
      dockerfile: Dockerfile
    image: geoserver-mcp:local
    environment:
      - GEOSERVER_URL=${GEOSERVER_URL:-http://geoserver:8080/geoserver}
      - GEOSERVER_USER=${GEOSERVER_USER:-admin}
      - GEOSERVER_PASSWORD=${GEOSERVER_PASSWORD:-geoserver}
      - GEOSERVER_WORKSPACE=${GEOSERVER_WORKSPACE:-zonasiluwu}
    ports:
      - "127.0.0.1:8001:8000"       # SSE endpoint (port 8000 conflict with Coolify API)
    depends_on:
      geoserver:
        condition: service_healthy
    networks:
      - app-net
    restart: unless-stopped

  # ── GS AI Bridge (DeepSeek + GeoServer read-only) ─────
  # Jembatan aman untuk map.html: terima POST /ask, panggil DeepSeek (key
  # server-side), eksekusi HANYA 4 tool GeoServer read-only via geoserver-mcp,
  # balas jawaban bahasa natural. CORS dikunci ke training-02.
  gs-ai-bridge:
    build:
      context: ./gs-ai-bridge
      dockerfile: Dockerfile
    image: gs-ai-bridge:local
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}                  # set di Coolify, JANGAN commit
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - GEOSERVER_MCP_SSE_URL=${GEOSERVER_MCP_SSE_URL:-http://geoserver-mcp:8000/sse}
      - GEOSERVER_WORKSPACE=${GEOSERVER_WORKSPACE:-zonasiluwu}
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN:-https://training-02.wanantara.org}
    expose:
      - "8080"                       # satu-satunya port → Traefik route ke 8080 (HTTPS domain via Coolify)
    depends_on:
      - geoserver-mcp
    networks:
      - app-net
    restart: unless-stopped

  # ── AHP-MCE Backend (Django/DRF) ──────────────────────
  # API kuisioner pembobotan AHP untuk frontend mce-index & mce-hasil
  # (TRAINING-02). Memakai instance Postgres yang sama dgn PostGIS, tetapi
  # database TERPISAH "ahp_mce" (dibuat otomatis oleh entrypoint). Skema +
  # data awal 15 pakar/420 pairwise di-seed oleh migrasi Django (fixture).
  # Prod: Traefik route domain (mis. mce-api.app.wanantara.org) -> 8000.
  ahp-backend:
    build:
      context: ./ahp-backend
      dockerfile: Dockerfile
    image: ahp-backend:local
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-dev-insecure-change-me}   # set di Coolify utk prod
      - DJANGO_DEBUG=${DJANGO_DEBUG:-0}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-mce-api.app.wanantara.org,localhost,127.0.0.1,ahp-backend}
      - POSTGRES_DB=${AHP_DB:-ahp_mce}
      - POSTGRES_USER=${POSTGIS_USER:-geoserver}
      - POSTGRES_PASSWORD=${POSTGIS_PASS:-geoserver}
      - POSTGRES_HOST=postgis
      - POSTGRES_PORT=5432
      - CORS_ALLOWED_ORIGINS=${AHP_CORS_ORIGINS:-https://training-02.wanantara.org,http://localhost:8033}
      - CSRF_TRUSTED_ORIGINS=${AHP_CSRF_ORIGINS:-https://training-02.wanantara.org,https://mce-api.app.wanantara.org}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}                          # opsional (narasi AI)
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL:-https://training-02.wanantara.org}  # tautan topmenu admin
      - ADMIN_PASSWORD=${AHP_ADMIN_PASSWORD:-}                            # sandi CRUD panel admin frontend (set di Coolify)
    expose:
      - "8000"                       # Traefik route ke 8000 (HTTPS domain via Coolify)
    depends_on:
      postgis:
        condition: service_healthy
    networks:
      - app-net
    restart: unless-stopped

networks:
  app-net:
    driver: bridge

volumes:
  geoserver-data:
  postgis-data:
